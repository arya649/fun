<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daily.wtf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,800;1,400;1,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c: #ff6b9d;
  --bg1: #fff0f5;
  --bg2: #ffe8f0;
}

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 32px 20px;
  overflow-x: hidden;
  position: relative;
  transition: background 0.7s ease;
}

/* ── animated bubbly background ── */
.bg-wrap {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  transition: background 0.7s;
}

.bubble {
  position: absolute;
  border-radius: 50%;
  opacity: 0.18;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.18; }
  50%  { opacity: 0.28; }
  100% { transform: translateY(-110vh) scale(1.2) rotate(360deg); opacity: 0; }
}

/* ── doodle decorations ── */
.doodle {
  position: fixed;
  font-size: 28px;
  opacity: 0.13;
  animation: wiggle 4s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
  user-select: none;
}
.doodle:nth-child(2) { animation-delay: -1.2s; }
.doodle:nth-child(3) { animation-delay: -2.5s; }
.doodle:nth-child(4) { animation-delay: -0.7s; }
.doodle:nth-child(5) { animation-delay: -3s; }

@keyframes wiggle {
  0%,100% { transform: rotate(-8deg) scale(1); }
  50%      { transform: rotate(8deg) scale(1.1); }
}

/* ── container ── */
.container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 500px;
}

/* ── header ── */
.header {
  text-align: center;
  margin-bottom: 28px;
  opacity: 0;
  animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
}

.logo {
  font-family: 'Fredoka', sans-serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1;
  transition: color 0.5s;
}

.logo span {
  display: inline-block;
  animation: letterBounce 2s ease-in-out infinite;
}
.logo span:nth-child(2) { animation-delay: 0.1s; }
.logo span:nth-child(3) { animation-delay: 0.2s; }
.logo span:nth-child(4) { animation-delay: 0.3s; }
.logo span:nth-child(5) { animation-delay: 0.4s; }
.logo span:nth-child(6) { animation-delay: 0.5s; }
.logo span:nth-child(7) { animation-delay: 0.6s; }
.logo span:nth-child(8) { animation-delay: 0.7s; }
.logo span:nth-child(9) { animation-delay: 0.8s; }

@keyframes letterBounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}

.date-line {
  font-size: 13px;
  margin-top: 6px;
  opacity: 0.5;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* ── main card ── */
.card {
  border-radius: 28px;
  padding: 40px 36px 32px;
  position: relative;
  opacity: 0;
  animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.15s forwards;
  transition: background 0.5s, box-shadow 0.5s;
  overflow: hidden;
}

/* big sticker behind content */
.card-sticker {
  position: absolute;
  bottom: -10px;
  right: -10px;
  font-size: 130px;
  opacity: 0.1;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  transform: rotate(12deg);
  transition: all 0.5s;
}

/* wiggly top badge */
.type-badge {
  display: inline-block;
  font-family: 'Fredoka', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 999px;
  margin-bottom: 20px;
  letter-spacing: 0.03em;
  transition: background 0.5s, color 0.5s;
  animation: badgePop 0.4s cubic-bezier(.34,1.56,.64,1) 0.3s both;
}

@keyframes badgePop {
  from { transform: scale(0.5) rotate(-6deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}

.card-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 34px;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 16px;
  transition: color 0.5s;
}

.card-content {
  font-size: 17px;
  line-height: 1.75;
  white-space: pre-line;
  font-weight: 500;
  transition: color 0.5s;
}

/* punchline highlight for jokes */
.punchline {
  display: inline-block;
  font-size: 19px;
  font-weight: 800;
  font-style: italic;
  margin-top: 4px;
}

/* ── options ── */
.options {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 14px;
  cursor: default;
  transition: transform 0.15s, background 0.2s;
  font-size: 14px;
  font-weight: 600;
}
.option-row:hover { transform: translateX(4px); }

.option-key {
  font-family: 'Fredoka', sans-serif;
  font-size: 15px;
  font-weight: 700;
  min-width: 28px;
  text-align: center;
  transition: color 0.5s;
}

.option-val { opacity: 0.8; }

/* action hint */
.action-hint {
  margin-top: 18px;
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 600;
  font-style: italic;
}

/* ── footer strip ── */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 28px;
  padding-top: 20px;
}

.day-chip {
  font-family: 'Fredoka', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 999px;
  opacity: 0.65;
  transition: background 0.5s, color 0.5s;
}

.notify-btn {
  font-family: 'Fredoka', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 8px 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  transition: transform 0.15s, background 0.5s, color 0.5s;
  letter-spacing: 0.02em;
}
.notify-btn:hover  { transform: scale(1.06); }
.notify-btn:active { transform: scale(0.96); }

/* ── page footer ── */
.page-footer {
  text-align: center;
  margin-top: 18px;
  opacity: 0;
  animation: popIn 0.5s ease 0.4s forwards;
}
.footer-text {
  font-size: 12px;
  font-weight: 600;
  opacity: 0.35;
}
.progress-track {
  width: 70px;
  height: 5px;
  border-radius: 99px;
  margin: 8px auto 0;
  overflow: hidden;
  opacity: 0.3;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.6s ease, background 0.5s;
}

/* ── toast ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  font-family: 'Fredoka', sans-serif;
  font-size: 15px;
  font-weight: 600;
  padding: 12px 26px;
  border-radius: 999px;
  z-index: 100;
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.88) translateY(12px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes glitchShake {
  0%,100% { transform: translate(0); }
  20% { transform: translate(-3px, 1px); }
  40% { transform: translate(3px, -1px); }
  60% { transform: translate(-2px, 2px); }
  80% { transform: translate(2px, -2px); }
}

@media (max-width: 480px) {
  .card { padding: 30px 24px 24px; }
  .card-title { font-size: 28px; }
  .card-sticker { font-size: 100px; }
  .logo { font-size: 30px; }
}
</style>
</head>

// ── per-type visual config ──
// bg: body bg, card: card bg, accent: highlight, text: main text, badge: pill bg/color, sticker, bubbles
const themes = {
  joke:           { bg:'#fff5e6', card:'#fff9f0', accent:'#ff9f43', text:'#7a4400', badge:['#ffe0b2','#e65100'], sticker:'😂', bubbles:['#ffcc80','#ffab40','#ff9800','#ffd54f'], shadow:'rgba(255,159,67,0.25)' },
  decision:       { bg:'#f0fff4', card:'#f5fff8', accent:'#26de81', text:'#1a4a2a', badge:['#b9f5d0','#1a6b35'], sticker:'🎯', bubbles:['#a5d6a7','#66bb6a','#81c784','#c8e6c9'], shadow:'rgba(38,222,129,0.2)' },
  challenge:      { bg:'#fff3e0', card:'#fff8f0', accent:'#fd7272', text:'#7a1a00', badge:['#ffcdd2','#c62828'], sticker:'💪', bubbles:['#ef9a9a','#e57373','#ff8a65','#ffab91'], shadow:'rgba(253,114,114,0.22)' },
  weird_fact:     { bg:'#e8f4fd', card:'#f0f8ff', accent:'#45aaf2', text:'#0a3a5a', badge:['#b3e0ff','#0066aa'], sticker:'🐙', bubbles:['#90caf9','#64b5f6','#42a5f5','#bbdefb'], shadow:'rgba(69,170,242,0.2)' },

  tiny_story:     { bg:'#f8f0ff', card:'#fcf5ff', accent:'#8854d0', text:'#3a0060', badge:['#d8b4fe','#6d28d9'], sticker:'🌙', bubbles:['#b39ddb','#9575cd','#7e57c2','#ede7f6'], shadow:'rgba(136,84,208,0.2)' },
  life_tip:       { bg:'#e8fffe', card:'#f0ffff', accent:'#2bcbba', text:'#004a44', badge:['#a0f0eb','#007a70'], sticker:'💡', bubbles:['#80cbc4','#4db6ac','#26a69a','#b2dfdb'], shadow:'rgba(43,203,186,0.2)' },
  fun_task:       { bg:'#fffde7', card:'#ffffe8', accent:'#ffd32a', text:'#5a4000', badge:['#fff9c4','#f57f17'], sticker:'🎲', bubbles:['#fff176','#ffee58','#ffeb3b','#fff9c4'], shadow:'rgba(255,211,42,0.22)' },
  absurd:         { bg:'#fdf0ff', card:'#fff5ff', accent:'#cd84f1', text:'#500060', badge:['#ead0ff','#7b00aa'], sticker:'🐦', bubbles:['#e040fb','#ce93d8','#ba68c8','#f3e5f5'], shadow:'rgba(205,132,241,0.22)' },

  motivation:     { bg:'#fff0f5', card:'#fff5f8', accent:'#ff4757', text:'#7a0020', badge:['#ffd0da','#b71c1c'], sticker:'🔥', bubbles:['#ef9a9a','#e57373','#f44336','#ffcdd2'], shadow:'rgba(255,71,87,0.22)' },

};

const typeLabels = {
  joke:'joke of the day 😂', decision:'make a choice 🎯', challenge:'dare you 💪',
  weird_fact:'did you know 🤯', thought:'random thought 🌀', interactive:'your turn ✨',
  tiny_story:'story time 📖', life_tip:'pro tip 💡', fun_task:'do it 🎲',
  absurd:'absolutely true 🐦', question:'think harder 🔭', game:'let\'s play 🎮',
  motivation:'you got this 🔥', randomizer:'fate speaks 🎰', meta:'wait what 👁',
  glitch:'error 404 ⚡', weird_decision:'the oracle 🔮'
};

function getDayIndex() {
  const anchor = new Date('2026-03-25T00:00:00');
  const anchorDayIndex = 4; // day 5 = index 4
  const now = new Date();
  const daysSinceAnchor = Math.floor((now - anchor) / 86400000);
  return (anchorDayIndex + daysSinceAnchor) % days.length;
}

function formatDate(d) {
  return d.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long' });
}

function makeBubbles(colors, bgWrap) {
  bgWrap.innerHTML = '';
  const N = 14;
  for (let i = 0; i < N; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 40 + Math.random() * 100;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const dur = 8 + Math.random() * 14;
    const delay = -Math.random() * dur;
    b.style.cssText = `width:${size}px;height:${size}px;left:${left}%;bottom:-${size}px;background:${color};animation-duration:${dur}s;animation-delay:${delay}s;`;
    bgWrap.appendChild(b);
  }
}

function renderCard(entry, index) {
  const t = themes[entry.type] || themes.meta;
  const label = typeLabels[entry.type] || entry.type;

  // body + bg
  document.body.style.background = t.bg;
  makeBubbles(t.bubbles, document.getElementById('bg-wrap'));
  document.getElementById('bg-wrap').style.background = t.bg;

  // logo colour
  document.getElementById('logo').style.color = t.accent;

  // date
  document.getElementById('date-line').textContent = formatDate(new Date());
  document.getElementById('date-line').style.color = t.text;

  // card
  const card = document.getElementById('main-card');
  card.style.background = t.card;
  card.style.boxShadow = `0 20px 60px ${t.shadow}, 0 4px 20px ${t.shadow}`;

  // sticker
  document.getElementById('card-sticker').textContent = t.sticker;

  // badge
  const badge = document.getElementById('type-badge');
  badge.textContent = label;
  badge.style.background = t.badge[0];
  badge.style.color = t.badge[1];

  // title + content
  const titleEl = document.getElementById('card-title');
  titleEl.textContent = entry.title;
  titleEl.style.color = t.text;

  const contentEl = document.getElementById('card-content');
  // for jokes, split setup and punchline
  if (entry.type === 'joke' && entry.content.includes('\n\n')) {
    const [setup, punch] = entry.content.split('\n\n');
    contentEl.innerHTML = `<span style="color:${t.text};opacity:0.7">${setup}</span>\n\n<span class="punchline" style="color:${t.accent}">${punch}</span>`;
  } else {
    contentEl.textContent = entry.content;
    contentEl.style.color = t.text;
    contentEl.style.opacity = '0.75';
  }

  // options
  const optContainer = document.getElementById('options-container');
  optContainer.innerHTML = '';
  if (entry.options) {
    const div = document.createElement('div');
    div.className = 'options';
    Object.entries(entry.options).forEach(([k, v]) => {
      const row = document.createElement('div');
      row.className = 'option-row';
      row.style.background = t.badge[0] + '88';
      row.innerHTML = `<span class="option-key" style="color:${t.accent}">${k}</span><span class="option-val" style="color:${t.text}">${v}</span>`;
      div.appendChild(row);
    });
    optContainer.appendChild(div);
  }

  // action hint
  const actContainer = document.getElementById('action-container');
  actContainer.innerHTML = entry.action
    ? `<div class="action-hint" style="background:${t.badge[0]}88;color:${t.text}">→ ${entry.action}</div>` : '';

  // day chip
  const chip = document.getElementById('day-chip');
  chip.textContent = `day ${(index % days.length) + 1} of ${days.length}`;
  chip.style.background = t.badge[0];
  chip.style.color = t.badge[1];

  // notify btn
  const btn = document.getElementById('notify-btn');
  btn.style.background = t.accent;
  btn.style.color = '#fff';

  // progress
  const pct = ((index + 1) / days.length * 100).toFixed(1);
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = t.accent;

  // toast colour
  document.getElementById('toast').style.background = t.accent;
  document.getElementById('toast').style.color = '#fff';

  // glitch title anim
  titleEl.style.animation = entry.type === 'glitch' ? 'glitchShake 2.5s infinite' : 'none';
}

// ── toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── notifications ──
let notifEnabled = localStorage.getItem('notif_enabled') === 'true';

function updateNotifyBtn() {
  const btn = document.getElementById('notify-btn');
  if (notifEnabled) {
    btn.textContent = '🔔 on!';
    btn.style.opacity = '0.75';
  } else {
    btn.textContent = '🔔 remind me';
    btn.style.opacity = '1';
  }
}

async function toggleNotifications() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    showToast('not supported here 😬'); return;
  }
  if (notifEnabled) {
    notifEnabled = false;
    localStorage.setItem('notif_enabled','false');
    updateNotifyBtn();
    showToast('notifications off 🔕'); return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { showToast('denied 😔'); return; }
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    notifEnabled = true;
    localStorage.setItem('notif_enabled','true');
    updateNotifyBtn();
    showToast('8:30am everyday 🔔✨');
    reg.active && reg.active.postMessage({ type:'SCHEDULE' });
  } catch(e) { showToast('something went wrong 😬'); }
}

// ── init ──
const idx = getDayIndex();
renderCard(days[idx], idx);
updateNotifyBtn();
</script>
